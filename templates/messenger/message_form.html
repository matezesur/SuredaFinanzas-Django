{% extends 'base.html' %}

{% block contenido %}
<div class="card">
    <h2>Enviar mensaje</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="boton" type="submit">Enviar</button>
        <a class="boton secundario" href="{% url 'inbox' %}">Cancelar</a>
    </form>
</div>
{% endblock %}
