{% extends 'base.html' %}

{% block contenido %}
<article class="card">
    <h2>{{ page.titulo }}</h2>
    <p class="meta">{{ page.categoria }} | {{ page.fecha_publicacion }}</p>
    <h3>{{ page.subtitulo }}</h3>

    {% if page.imagen %}
        <img class="page-image" src="{{ page.imagen.url }}" alt="{{ page.titulo }}">
    {% endif %}

    <div>{{ page.contenido|safe }}</div>

    <div class="actions">
        <a class="boton secundario" href="{% url 'page_list' %}">Volver</a>
        {% if user.is_authenticated %}
            <a class="boton" href="{% url 'page_update' page.pk %}">Editar</a>
            <a class="boton danger" href="{% url 'page_delete' page.pk %}">Borrar</a>
        {% endif %}
    </div>
</article>
{% endblock %}
