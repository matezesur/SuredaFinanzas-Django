{% extends 'base.html' %}

{% block contenido %}
<div class="card">
    <h2>Editar perfil</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h3>Datos de usuario</h3>
        {{ user_form.as_p }}
        <h3>Datos del perfil</h3>
        {{ profile_form.as_p }}
        <button class="boton" type="submit">Guardar cambios</button>
        <a class="boton secundario" href="{% url 'profile' %}">Cancelar</a>
    </form>
</div>
{% endblock %}
